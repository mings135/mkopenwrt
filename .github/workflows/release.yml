name: Lede Build and Release

on:
  schedule:
    - cron: "6 0 * * 5"
  workflow_dispatch:

env:
  SRC_DIR: lede
  SRC_URL: https://github.com/coolsnowwolf/lede.git
  PASSWALL2_URL: https://github.com/Openwrt-Passwall/openwrt-passwall2.git
  PASSWALL_PKG_URL: https://github.com/Openwrt-Passwall/openwrt-passwall-packages.git

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    strategy:
      matrix:
        arch:
          - name: x86
            type: 64
            device: generic
          - name: rockchip
            type: armv8
            device: friendlyarm_nanopi-r2s

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Free Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # this might remove tools that are actually needed,
          # when set to "true" but frees about 6 GB
          tool-cache: true
          # all of these default to true, but feel free to set to
          # "false" if necessary for your workflow
          android: true
          dotnet: true
          haskell: true
          large-packages: false
          docker-images: true
          swap-storage: true

      - name: Install Dependencies
        run: |
          sudo -E apt-get update
          sudo -E apt install -y ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang cmake cpio curl device-tree-compiler flex gawk gcc-multilib g++-multilib gettext \
          genisoimage git gperf haveged help2man intltool libc6-dev-i386 libelf-dev libfuse-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5-dev libpython3-dev \
          libreadline-dev libssl-dev libtool llvm lrzsz libnsl-dev ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pyelftools python3-setuptools qemu-utils rsync scons squashfs-tools subversion \
          swig texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev

      - name: Clone Project
        run: |
          tmp_ver=$(git ls-remote --tags ${{ env.PASSWALL2_URL }} | sed -n '$p' | awk -F '/' '{print $NF}')
          echo "PASSWALL2_VER=${tmp_ver}" >> $GITHUB_ENV
          echo "RELEASE_TAG=v$(date +'%Y.%m.%d')" >> $GITHUB_ENV
          echo "TARGET_DIR=bin/targets/${{ matrix.arch.name }}/${{ matrix.arch.type }}" >> $GITHUB_ENV
          git clone --depth=1 ${{ env.SRC_URL }} ${{ env.SRC_DIR }}
         
      - name: Modify Config
        working-directory: ${{ env.SRC_DIR }}
        run: |
          echo "LEDE_VER=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
          tmp_file="feeds.conf.default"
          sed -i '/^src-git passwall_pkg/d' ${tmp_file}
          sed -i '/^src-git passwall2/d' ${tmp_file}
          echo 'src-git passwall_pkg ${{ env.PASSWALL_PKG_URL }};main' >> ${tmp_file}
          echo 'src-git passwall2 ${{ env.PASSWALL2_URL }};${{ env.PASSWALL2_VER }}' >> ${tmp_file}
          tmp_file="package/base-files/files/bin/config_generate"
          sed -i "s/system\.ntp\.enable_server='1'/system.ntp.enable_server='0'/" ${tmp_file}

      - name: Prepare Compile
        working-directory: ${{ env.SRC_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a
          ./scripts/feeds install -a
          cat > .config <<EOF
          CONFIG_TARGET_${{ matrix.arch.name }}=y
          CONFIG_TARGET_${{ matrix.arch.name }}_${{ matrix.arch.type }}=y
          CONFIG_TARGET_${{ matrix.arch.name }}_${{ matrix.arch.type }}_DEVICE_${{ matrix.arch.device }}=y
          CONFIG_TARGET_KERNEL_PARTSIZE=128
          CONFIG_TARGET_ROOTFS_PARTSIZE=1024
          CONFIG_PACKAGE_luci-app-passwall2=y
          CONFIG_PACKAGE_luci-app-wireguard=y
          # CONFIG_PACKAGE_luci-app-accesscontrol is not set
          # CONFIG_PACKAGE_luci-app-ddns is not set
          # CONFIG_PACKAGE_luci-app-ipsec-vpnd is not set
          # CONFIG_PACKAGE_luci-app-vsftpd is not set
          # CONFIG_PACKAGE_luci-app-wol is not set
          # CONFIG_PACKAGE_luci-app-xlnetacc is not set
          EOF
          make defconfig
          make download -j8

      - name: Compile Firmware
        working-directory: ${{ env.SRC_DIR }}
        run: |
          make V=s -j$(nproc)

      - name: Check File
        working-directory: ${{ env.SRC_DIR }}
        run: |
          if [ ! -e ${{ env.TARGET_DIR }} ]; then
            echo "Build failed or output directory not found!"
            exit 1
          fi
          ls -l ${{ env.TARGET_DIR }}

          if ! ls -l ${{ env.TARGET_DIR }} | grep -q '.img.gz$'; then
            echo "Build failed or output file not found!"
            exit 1
          fi

      - name: Create or Update Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ env.RELEASE_TAG }}
          RELEASE_TITLE: ${{ env.RELEASE_TAG }}
          RELEASE_NOTES: |
            OpenWrt Firmware(x86 and R2S)
            - lede version: ${{ env.LEDE_VER }}
            - passwall2 version: ${{ env.PASSWALL2_VER }}
          RELEASE_FILES: ${{ env.SRC_DIR }}/${{ env.TARGET_DIR }}/*.img.gz
        run: |
          echo "--- 正在处理 Release $RELEASE_TAG ---" 
          # 检查 Release 是否已经存在
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release 已存在，正在上传新文件..."
            gh release upload "$RELEASE_TAG" "$RELEASE_FILES" --clobber
          else
            echo "创建新 Release 并上传文件..."
            gh release create "$RELEASE_TAG" "$RELEASE_FILES" \
              --title "$RELEASE_TITLE" \
              --notes "$RELEASE_NOTES"
          fi

  clean:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      actions: write
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Clean Releases and Workflows
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEEP_RELEASES: 20
          KEEP_WORKFLOWS: 8
        run: |
          REL_SKIP=$((KEEP_RELEASES + 1))
          RUN_SKIP=$((KEEP_WORKFLOWS + 1))

          echo "--- 正在清理旧的 Release 和 Tag ---"
          RELEASES=$(gh release list --limit 100 --json tagName,isLatest \
            --jq '.[] | select(.isLatest == false) | .tagName' \
            | tail -n +"$REL_SKIP") 
          
          if [ -n "$RELEASES" ]; then
            echo "发现待删除 Release:
          $RELEASES"
            echo "$RELEASES" | xargs -r -I % -n 1 gh release delete % --yes --cleanup-tag
          else
            echo "✅ 没有需要删除的 Release"
          fi

          echo "--- 正在清理旧的 Workflow 运行记录 ---"
          RUN_IDS=$(gh run list --limit 100 --status completed --json databaseId \
            --jq '.[].databaseId' \
            | tail -n +"$RUN_SKIP")
          
          if [ -n "$RUN_IDS" ]; then
            echo "发现待删除运行记录 ID: 
          $RUN_IDS"
            echo "$RUN_IDS" | xargs -r -I % -n 1 gh run delete %
          else
            echo "✅ 没有需要删除的运行记录"
          fi